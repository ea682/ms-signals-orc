server:
  port: ${PORT:4108}

rest-client:
  timeout:
    connect-ms: 2000
    read-ms: 50000
  metric-wallet:
    info-base: ${URL_METRIC:http://localhost:4102/}
  binance-service:
    info-base: ${URL_BINANCE:http://192.168.1.123:4106}

logging:
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%t]){faint} %clr(%logger{36}){cyan} : %msg%n%wex'

spring:
  output:
    ansi:
      enabled: ALWAYS

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:192.168.1.123:9094}

    listener:
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:true}

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:operaciones-consumer-debug-erik}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.apunto.signalsorc.kafka.dto.OperacionEvent

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://192.168.1.123:5432/trading_futuros?currentSchema=${DB_SCHEMA:futuros_operaciones_dev}}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:5450940}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:futuros_operaciones_dev}
        jdbc.time_zone: UTC
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      probes:
        enabled: true

  metrics:
    distribution:
      percentiles-histogram:
        "signals.copy.ingest.duration": true
        "signals.copy.job.queue.wait": true
        "signals.copy.job.execution": true

      slo:
        "signals.copy.ingest.duration": [ 50ms, 100ms, 250ms, 500ms, 1s, 2s ]
        "signals.copy.job.queue.wait": [ 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s, 10s ]
        "signals.copy.job.execution": [ 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s ]

app:
  kafka:
    operaciones:
      topic: ${KAFKA_TOPIC_OPERACIONES:futures-position-eventos}

binance:
  dispatch:
    delay-ms: 100
    pool-size: 4

copy:
  job:
    worker:
      pool-size: 16
      max-batch: 200
      poll-ms: 200
      max-attempts: 12

engine:
  copy:
    execution-job-worker:
      enabled: true
  metric-wallet:
    distribution-worker:
      enabled: true

metric-wallet:
  distribution:
    refresh-job: 2m

