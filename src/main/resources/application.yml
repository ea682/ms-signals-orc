server:
  port: ${PORT:4108}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

rest-client:
  timeout:
    connect-ms: ${REST_CLIENT_CONNECT_TIMEOUT_MS:2000}
    read-ms: ${REST_CLIENT_READ_TIMEOUT_MS:50000}
  metric-wallet:
    info-base: ${URL_METRIC:http://ms-metrica-cuenta:4102/}
  binance-service:
    info-base: ${URL_BINANCE:http://192.168.1.123:4106}
    connect-ms: ${BINANCE_ORDER_CONNECT_TIMEOUT_MS:1000}
    read-ms: ${BINANCE_ORDER_READ_TIMEOUT_MS:8000}
    close-connect-ms: ${BINANCE_CLOSE_CONNECT_TIMEOUT_MS:1000}
    close-read-ms: ${BINANCE_CLOSE_READ_TIMEOUT_MS:8000}

logging:
  pattern:
    console: "ts=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%level app=${spring.application.name} profile=${spring.profiles.active:-NA} env=${APP_ENV:local} thread=\"%thread\" logger=\"%logger{36}\" traceId=%X{traceId:-NA} %msg%n%ex"

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:ms-signals-orc}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  output:
    ansi:
      enabled: ${SPRING_OUTPUT_ANSI_ENABLED:NEVER}

  flyway:
    postgresql:
      # Transactional advisory locks keep an old snapshot that self-blocks
      # CREATE INDEX CONCURRENTLY in non-transactional migrations.
      transactional-lock: ${FLYWAY_POSTGRESQL_TRANSACTIONAL_LOCK:false}

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:kafka:9092}

    listener:
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:true}

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:operaciones-consumer}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        fetch.max.wait.ms: ${KAFKA_FETCH_MAX_WAIT_MS:25}
        fetch.min.bytes: ${KAFKA_FETCH_MIN_BYTES:1}
        max.poll.records: ${KAFKA_MAX_POLL_RECORDS:100}
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.apunto.engine.events.OperacionEvent

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  jpa:
    open-in-view: ${SPRING_JPA_OPEN_IN_VIEW:false}
    show-sql: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:futuros_operaciones}
        jdbc.time_zone: UTC
        format_sql: ${HIBERNATE_FORMAT_SQL:false}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSED_ENDPOINTS:health,info,prometheus,metrics}

  endpoint:
    health:
      probes:
        enabled: true

  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "signals.copy.ingest.duration": true
        "signals.copy.job.queue.wait": true
        "signals.copy.job.execution": true

      slo:
        "signals.copy.ingest.duration": [ 50ms, 100ms, 250ms, 500ms, 1s, 2s ]
        "signals.copy.job.queue.wait": [ 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s, 10s ]
        "signals.copy.job.execution": [ 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s ]

app:
  kafka:
    operaciones:
      topic: ${KAFKA_TOPIC_OPERACIONES:futures-position-eventos}

binance:
  order-submit-enabled: ${BINANCE_ORDER_SUBMIT_ENABLED:false}
  live-safe-validation-mode: ${BINANCE_LIVE_SAFE_VALIDATION_MODE:true}
  trading-config-preconfigure:
    enabled: ${BINANCE_TRADING_CONFIG_PRECONFIGURE_ENABLED:true}
    initial-delay-ms: ${BINANCE_TRADING_CONFIG_PRECONFIGURE_INITIAL_DELAY_MS:60000}
    fixed-delay-ms: ${BINANCE_TRADING_CONFIG_PRECONFIGURE_FIXED_DELAY_MS:600000}
    recent-lookback-days: ${BINANCE_TRADING_CONFIG_PRECONFIGURE_LOOKBACK_DAYS:14}
    max-symbols-per-allocation: ${BINANCE_TRADING_CONFIG_PRECONFIGURE_MAX_SYMBOLS_PER_ALLOCATION:20}
    margin-type: ${BINANCE_TRADING_CONFIG_PRECONFIGURE_MARGIN_TYPE:CROSSED}
  dispatch:
    delay-ms: ${BINANCE_DISPATCH_DELAY_MS:0}
    pool-size: ${BINANCE_DISPATCH_POOL_SIZE:8}
  symbols:
    cache-ttl-ms: ${BINANCE_SYMBOLS_CACHE_TTL_MS:60000}
    api-key: ${BINANCE_SYMBOLS_API_KEY:}
    warmup-on-start: ${BINANCE_SYMBOLS_WARMUP_ON_START:true}
    require-trading-status: ${BINANCE_SYMBOLS_REQUIRE_TRADING_STATUS:true}

copy:
  new-dispatch:
    enabled: ${COPY_NEW_DISPATCH_ENABLED:false}
  live:
    enabled: ${COPY_LIVE_ENABLED:false}
    canary-enabled: ${COPY_LIVE_CANARY_ENABLED:false}
    dry-run: ${COPY_LIVE_DRY_RUN:true}
    max-capital-amount: ${COPY_LIVE_MAX_CAPITAL_AMOUNT:100}
    scale-enabled: ${COPY_LIVE_SCALE_ENABLED:false}
    sizing-mode: ${COPY_LIVE_SIZING_MODE:SOURCE_EXPOSURE_PERCENT}
    require-source-exposure: ${COPY_LIVE_REQUIRE_SOURCE_EXPOSURE:true}
    max-source-exposure-pct: ${COPY_LIVE_MAX_SOURCE_EXPOSURE_PCT:0.25}
    margin-buffer-pct: ${COPY_LIVE_MARGIN_BUFFER_PCT:0.03}
    whitelist:
      user-ids: ${COPY_LIVE_WHITELIST_USER_IDS:}
      wallet-ids: ${COPY_LIVE_WHITELIST_WALLET_IDS:}
      symbols: ${COPY_LIVE_WHITELIST_SYMBOLS:}
      allocation-ids: ${COPY_LIVE_WHITELIST_ALLOCATION_IDS:}
      strategy-codes: ${COPY_LIVE_WHITELIST_STRATEGY_CODES:}
  micro-live:
    enabled: ${COPY_MICRO_LIVE_ENABLED:false}
    max-capital-amount: ${COPY_MICRO_LIVE_MAX_CAPITAL_AMOUNT:100}
    initial-capital-usd: ${COPY_MICRO_LIVE_INITIAL_CAPITAL_USD:100}
    max-capital-usd: ${COPY_MICRO_LIVE_MAX_CAPITAL_USD:100}
    total-capital-usd: ${COPY_MICRO_LIVE_TOTAL_CAPITAL_USD:100}
    target-leverage: ${COPY_MICRO_LIVE_TARGET_LEVERAGE:5}
    margin-buffer-pct: ${COPY_MICRO_LIVE_MARGIN_BUFFER_PCT:0.03}
  source-equity:
    max-age-ms: ${COPY_SOURCE_EQUITY_MAX_AGE_MS:30000}
  target-position-authority:
    cache-ttl-ms: ${COPY_TARGET_POSITION_CACHE_TTL_MS:250}
    max-age-ms: ${COPY_TARGET_POSITION_MAX_AGE_MS:1000}
  runtime:
    forbid-db-in-live-hot-path: ${COPY_RUNTIME_FORBID_DB_IN_LIVE_HOT_PATH:true}
    user-snapshot:
      initial-delay-ms: ${COPY_RUNTIME_USER_SNAPSHOT_INITIAL_DELAY_MS:0}
      refresh-ms: ${COPY_RUNTIME_USER_SNAPSHOT_REFRESH_MS:60000}
      max-stale: ${COPY_RUNTIME_USER_SNAPSHOT_MAX_STALE:PT10M}
    allocation-snapshot:
      initial-delay-ms: ${COPY_RUNTIME_ALLOCATION_SNAPSHOT_INITIAL_DELAY_MS:0}
      refresh-ms: ${COPY_RUNTIME_ALLOCATION_SNAPSHOT_REFRESH_MS:5000}
      max-stale: ${COPY_RUNTIME_ALLOCATION_SNAPSHOT_MAX_STALE:PT30S}
  promotion:
    enabled: ${COPY_PROMOTION_ENABLED:false}
    from-shadow-enabled: ${COPY_PROMOTION_FROM_SHADOW_ENABLED:true}
    candidate-limit: ${COPY_PROMOTION_CANDIDATE_LIMIT:100}
    min-shadow-days: ${COPY_PROMOTION_MIN_SHADOW_DAYS:3}
    min-shadow-events: ${COPY_PROMOTION_MIN_SHADOW_EVENTS:10}
    min-shadow-closed-positions: ${COPY_PROMOTION_MIN_SHADOW_CLOSED_POSITIONS:3}
    min-shadow-coverage-pct: ${COPY_PROMOTION_MIN_SHADOW_COVERAGE_PCT:95}
    require-active-wallet: ${COPY_PROMOTION_REQUIRE_ACTIVE_WALLET:true}
    max-inactive-days: ${COPY_PROMOTION_MAX_INACTIVE_DAYS:3}
    require-positive-shadow-pnl: ${COPY_PROMOTION_REQUIRE_POSITIVE_SHADOW_PNL:false}
    min-shadow-net-pnl-usd: ${COPY_PROMOTION_MIN_SHADOW_NET_PNL_USD:0}
    max-shadow-drawdown-pct: ${COPY_PROMOTION_MAX_SHADOW_DRAWDOWN_PCT:20}
    require-copy-guard-open: ${COPY_PROMOTION_REQUIRE_COPY_GUARD_OPEN:true}
    allow-shadow-only-summary: ${COPY_PROMOTION_ALLOW_SHADOW_ONLY_SUMMARY:false}
    default-target-mode: ${COPY_PROMOTION_DEFAULT_TARGET_MODE:MICRO_LIVE}
    direct-live-policy: ${COPY_PROMOTION_DIRECT_LIVE_POLICY:REQUIRE_MICRO_LIVE}
    micro-live-initial-capital-usd: ${COPY_MICRO_LIVE_INITIAL_CAPITAL_USD:100}
    micro-live-max-capital-usd: ${COPY_MICRO_LIVE_MAX_CAPITAL_USD:100}
    require-full-decision-for-micro-live: ${COPY_PROMOTION_REQUIRE_FULL_DECISION_FOR_MICRO_LIVE:true}
    copy-decision-min-history-days: ${COPY_PROMOTION_COPY_DECISION_MIN_HISTORY_DAYS:30}
    copy-decision-simulation-lookback-days: ${COPY_PROMOTION_COPY_DECISION_LOOKBACK_DAYS:60}
    copy-decision-max-facts-per-unit: ${COPY_PROMOTION_COPY_DECISION_MAX_FACTS_PER_UNIT:50000}
    copy-decision-timeout-ms: ${COPY_PROMOTION_COPY_DECISION_TIMEOUT_MS:55000}
    coverage:
      rolling-enabled: ${SHADOW_PROMOTION_COVERAGE_ROLLING_ENABLED:true}
      mode: ${SHADOW_COVERAGE_MODE:AUDIT}
      window-days: ${SHADOW_PROMOTION_COVERAGE_WINDOW_DAYS:14}
      max-events: ${SHADOW_PROMOTION_COVERAGE_MAX_EVENTS:500}
      min-evaluable-events: ${SHADOW_PROMOTION_COVERAGE_MIN_EVENTS:100}
      minimum-percent: ${SHADOW_PROMOTION_COVERAGE_MIN_PERCENT:95}
    job:
      enabled: ${COPY_PROMOTION_JOB_ENABLED:false}
      initial-delay-ms: ${COPY_PROMOTION_JOB_INITIAL_DELAY_MS:30000}
      fixed-delay-ms: ${COPY_PROMOTION_JOB_FIXED_DELAY_MS:120000}
  live-promotion:
    enabled: ${COPY_LIVE_PROMOTION_ENABLED:false}
    manual-certification-required: ${COPY_LIVE_PROMOTION_MANUAL_CERTIFICATION_REQUIRED:true}
    candidate-limit: ${COPY_LIVE_PROMOTION_CANDIDATE_LIMIT:100}
    min-micro-days: ${COPY_LIVE_PROMOTION_MIN_MICRO_DAYS:7}
    min-micro-orders: ${COPY_LIVE_PROMOTION_MIN_MICRO_ORDERS:10}
    min-submitted-orders: ${COPY_LIVE_PROMOTION_MIN_SUBMITTED_ORDERS:${COPY_LIVE_PROMOTION_MIN_MICRO_ORDERS:10}}
    min-acknowledged-orders: ${COPY_LIVE_PROMOTION_MIN_ACKNOWLEDGED_ORDERS:10}
    min-filled-orders: ${COPY_LIVE_PROMOTION_MIN_FILLED_ORDERS:10}
    min-closed-operations: ${COPY_LIVE_PROMOTION_MIN_CLOSED_OPERATIONS:3}
    max-dispatch-errors: ${COPY_LIVE_PROMOTION_MAX_DISPATCH_ERRORS:0}
    max-reconciliation-pending: ${COPY_LIVE_PROMOTION_MAX_RECONCILIATION_PENDING:0}
    max-duplicate-count: ${COPY_LIVE_PROMOTION_MAX_DUPLICATE_COUNT:0}
    max-unresolved-ambiguous-timeouts: ${COPY_LIVE_PROMOTION_MAX_UNRESOLVED_AMBIGUOUS_TIMEOUTS:0}
    min-slippage-samples: ${COPY_LIVE_PROMOTION_MIN_SLIPPAGE_SAMPLES:3}
    max-adverse-slippage-p95-bps: ${COPY_LIVE_PROMOTION_MAX_ADVERSE_SLIPPAGE_P95_BPS:10}
    max-drawdown-usd: ${COPY_LIVE_PROMOTION_MAX_DRAWDOWN_USD:20}
    max-error-rate-pct: ${COPY_LIVE_PROMOTION_MAX_ERROR_RATE_PCT:5}
    require-positive-net-pnl: ${COPY_LIVE_PROMOTION_REQUIRE_POSITIVE_NET_PNL:false}
    min-net-pnl-usd: ${COPY_LIVE_PROMOTION_MIN_NET_PNL_USD:0}
    require-full-decision-for-live: ${COPY_LIVE_PROMOTION_REQUIRE_FULL_DECISION_FOR_LIVE:true}
    copy-decision-min-history-days: ${COPY_LIVE_PROMOTION_COPY_DECISION_MIN_HISTORY_DAYS:30}
    copy-decision-simulation-lookback-days: ${COPY_LIVE_PROMOTION_COPY_DECISION_LOOKBACK_DAYS:60}
    copy-decision-max-facts-per-unit: ${COPY_LIVE_PROMOTION_COPY_DECISION_MAX_FACTS_PER_UNIT:50000}
    copy-decision-timeout-ms: ${COPY_LIVE_PROMOTION_COPY_DECISION_TIMEOUT_MS:55000}
    job:
      enabled: ${COPY_LIVE_PROMOTION_JOB_ENABLED:false}
      initial-delay-ms: ${COPY_LIVE_PROMOTION_JOB_INITIAL_DELAY_MS:45000}
      fixed-delay-ms: ${COPY_LIVE_PROMOTION_JOB_FIXED_DELAY_MS:300000}
  certification:
    runtime:
      exchange: ${COPY_CERTIFICATION_EXCHANGE:BINANCE}
      strategy-version: ${COPY_CERTIFICATION_STRATEGY_VERSION:copy-strategy-v3}
      sizing-policy-version: ${COPY_CERTIFICATION_SIZING_POLICY_VERSION:proportional-portfolio-v3}
      symbol-mapping-version: ${COPY_CERTIFICATION_SYMBOL_MAPPING_VERSION:binance-symbol-map-v3}
      fee-model-version: ${COPY_CERTIFICATION_FEE_MODEL_VERSION:binance-fee-v3}
      funding-model-version: ${COPY_CERTIFICATION_FUNDING_MODEL_VERSION:binance-funding-v3}
      slippage-model-version: ${COPY_CERTIFICATION_SLIPPAGE_MODEL_VERSION:binance-slippage-v3}
      liquidity-model-version: ${COPY_CERTIFICATION_LIQUIDITY_MODEL_VERSION:order-book-liquidity-v3}
  capital-allocator:
    enabled: ${COPY_CAPITAL_ALLOCATOR_ENABLED:true}
    scale-enabled: ${COPY_CAPITAL_ALLOCATOR_SCALE_ENABLED:false}
    safety-reserve-pct: ${COPY_CAPITAL_ALLOCATOR_SAFETY_RESERVE_PCT:0.10}
  postgres:
    deadlock-retry:
      max-attempts: ${COPY_POSTGRES_DEADLOCK_RETRY_MAX_ATTEMPTS:3}
      initial-backoff-ms: ${COPY_POSTGRES_DEADLOCK_RETRY_INITIAL_BACKOFF_MS:25}
      max-backoff-ms: ${COPY_POSTGRES_DEADLOCK_RETRY_MAX_BACKOFF_MS:250}
  live-readiness:
    min-closed-positions: ${COPY_LIVE_READINESS_MIN_CLOSED_POSITIONS:50}
    min-profit-factor: ${COPY_LIVE_READINESS_MIN_PROFIT_FACTOR:1.3}
    require-positive-expectancy: ${COPY_LIVE_READINESS_REQUIRE_POSITIVE_EXPECTANCY:true}
    require-positive-net-pnl: ${COPY_LIVE_READINESS_REQUIRE_POSITIVE_NET_PNL:true}
    max-top1-concentration: ${COPY_LIVE_READINESS_MAX_TOP1_CONCENTRATION:0.35}
    min-stable-hours-after-deploy: ${COPY_LIVE_READINESS_MIN_STABLE_HOURS_AFTER_DEPLOY:24}
    max-shadow-p95-end-to-end-ms: ${COPY_LIVE_READINESS_MAX_SHADOW_P95_END_TO_END_MS:500}
    max-live-mock-p95-end-to-end-ms: ${COPY_LIVE_READINESS_MAX_LIVE_MOCK_P95_END_TO_END_MS:1000}
    max-binance-p95-http-ms: ${COPY_LIVE_READINESS_MAX_BINANCE_P95_HTTP_MS:800}
    max-adverse-slippage-bps-p95: ${COPY_LIVE_READINESS_MAX_ADVERSE_SLIPPAGE_BPS_P95:10}
    max-adverse-slippage-usd-per-order: ${COPY_LIVE_READINESS_MAX_ADVERSE_SLIPPAGE_USD_PER_ORDER:1.00}
    require-slippage-sample-size: ${COPY_LIVE_READINESS_REQUIRE_SLIPPAGE_SAMPLE_SIZE:20}
    max-leverage-x: ${COPY_LIVE_READINESS_MAX_LEVERAGE_X:5}
    require-source-leverage: ${COPY_LIVE_READINESS_REQUIRE_SOURCE_LEVERAGE:true}
    require-live-leverage-confirmed: ${COPY_LIVE_READINESS_REQUIRE_LIVE_LEVERAGE_CONFIRMED:true}
    block-on-leverage-mismatch: ${COPY_LIVE_READINESS_BLOCK_ON_LEVERAGE_MISMATCH:true}
    block-on-margin-mode-mismatch: ${COPY_LIVE_READINESS_BLOCK_ON_MARGIN_MODE_MISMATCH:true}
    max-effective-leverage-x: ${COPY_LIVE_READINESS_MAX_EFFECTIVE_LEVERAGE_X:5}
    max-live-notional-usd-per-order: ${COPY_LIVE_READINESS_MAX_LIVE_NOTIONAL_USD_PER_ORDER:10}
    max-live-required-margin-usd-per-order: ${COPY_LIVE_READINESS_MAX_LIVE_REQUIRED_MARGIN_USD_PER_ORDER:10}
    min-micro-live-complete-cycles: ${COPY_LIVE_READINESS_MICRO_LIVE_MIN_COMPLETE_CYCLES:3}
    min-micro-live-meaningful-movements: ${COPY_LIVE_READINESS_MICRO_LIVE_MIN_MEANINGFUL_MOVEMENTS:30}
    evidence-micro-threshold-a: ${COPY_LIVE_READINESS_MICRO_LIVE_EVIDENCE_SCORE_A:55}
    evidence-micro-threshold-b: ${COPY_LIVE_READINESS_MICRO_LIVE_EVIDENCE_SCORE_B:60}
    evidence-micro-threshold-c: ${COPY_LIVE_READINESS_MICRO_LIVE_EVIDENCE_SCORE_C:70}
    evidence-micro-threshold-d: ${COPY_LIVE_READINESS_MICRO_LIVE_EVIDENCE_SCORE_D:80}
  shadow:
    async:
      enabled: ${COPY_SHADOW_ASYNC_ENABLED:true}
    queue-capacity: ${COPY_SHADOW_QUEUE_CAPACITY:100000}
    worker-threads: ${COPY_SHADOW_WORKER_THREADS:8}
    enqueue-timeout-ms: ${COPY_SHADOW_ENQUEUE_TIMEOUT_MS:2}
    log-slow-ms: ${COPY_SHADOW_LOG_SLOW_MS:100}
  job:
    ingest:
      filter-by-wallet-allocation: ${COPY_JOB_INGEST_FILTER_BY_WALLET_ALLOCATION:true}
      fallback-all-users-on-empty-allocation: ${COPY_JOB_INGEST_FALLBACK_ALL_USERS_ON_EMPTY_ALLOCATION:false}
    worker:
      pool-size: ${COPY_JOB_WORKER_POOL_SIZE:32}
      queue: ${COPY_JOB_WORKER_QUEUE:50000}
      max-batch: ${COPY_JOB_WORKER_MAX_BATCH:500}
      poll-ms: ${COPY_JOB_WORKER_POLL_MS:50}
      max-attempts: ${COPY_JOB_WORKER_MAX_ATTEMPTS:12}
    priority-worker:
      pool-size: ${COPY_JOB_PRIORITY_WORKER_POOL_SIZE:16}
      queue: ${COPY_JOB_PRIORITY_WORKER_QUEUE:20000}
  operation:
    active-cache:
      refresh-ms: ${COPY_OPERATION_ACTIVE_CACHE_REFRESH_MS:60000}
      pending-ttl-ms: ${COPY_OPERATION_ACTIVE_CACHE_PENDING_TTL_MS:120000}
  reconciliation:
    enabled: ${COPY_RECONCILIATION_ENABLED:true}
    initial-delay-ms: ${COPY_RECONCILIATION_INITIAL_DELAY_MS:10000}
    fixed-delay-ms: ${COPY_RECONCILIATION_FIXED_DELAY_MS:5000}
    batch-size: ${COPY_RECONCILIATION_BATCH_SIZE:50}
    max-attempts: ${COPY_RECONCILIATION_MAX_ATTEMPTS:20}
    dispatch-stale-after: ${COPY_RECONCILIATION_DISPATCH_STALE_AFTER:PT30S}
  observability:
    dispatch-gauges:
      enabled: ${COPY_DISPATCH_GAUGES_ENABLED:true}
      initial-delay-ms: ${COPY_DISPATCH_GAUGES_INITIAL_DELAY_MS:15000}
      refresh-ms: ${COPY_DISPATCH_GAUGES_REFRESH_MS:15000}
  simulation:
    worker:
      enabled: ${COPY_SIMULATION_WORKER_ENABLED:false}
      batch-size: ${COPY_SIMULATION_WORKER_BATCH_SIZE:1}
      fixed-delay-ms: ${COPY_SIMULATION_WORKER_FIXED_DELAY_MS:2000}
      yield-ms: ${COPY_SIMULATION_WORKER_YIELD_MS:2}
      stale-lock: ${COPY_SIMULATION_WORKER_STALE_LOCK:PT10M}
      retry-delay: ${COPY_SIMULATION_WORKER_RETRY_DELAY:PT1M}
      max-attempts: ${COPY_SIMULATION_WORKER_MAX_ATTEMPTS:5}
      instance-id: ${COPY_SIMULATION_WORKER_INSTANCE_ID:${spring.application.name}:cold-simulation}
    liquidity-worker:
      enabled: ${COPY_LIQUIDITY_WORKER_ENABLED:false}
      batch-size: ${COPY_LIQUIDITY_WORKER_BATCH_SIZE:1}
      fixed-delay-ms: ${COPY_LIQUIDITY_WORKER_FIXED_DELAY_MS:5000}
      stale-lock: ${COPY_LIQUIDITY_WORKER_STALE_LOCK:PT10M}
      retry-delay: ${COPY_LIQUIDITY_WORKER_RETRY_DELAY:PT1M}
      max-attempts: ${COPY_LIQUIDITY_WORKER_MAX_ATTEMPTS:5}
      depth-limit: ${COPY_LIQUIDITY_DEPTH_LIMIT:100}
      minimum-capital-usd: ${COPY_LIQUIDITY_MINIMUM_CAPITAL_USD:5000}
      maximum-depth-consumption-pct: ${COPY_LIQUIDITY_MAX_DEPTH_CONSUMPTION_PCT:0.30}
      participation-cap-pct: ${COPY_LIQUIDITY_PARTICIPATION_CAP_PCT:0.05}
      fragment-count: ${COPY_LIQUIDITY_FRAGMENT_COUNT:10}
      interval-millis: ${COPY_LIQUIDITY_INTERVAL_MILLIS:1000}
      disappearing-liquidity-pct: ${COPY_LIQUIDITY_DISAPPEARING_PCT:0.10}
      adverse-selection-bps: ${COPY_LIQUIDITY_ADVERSE_SELECTION_BPS:2}
      network-latency-millis: ${COPY_LIQUIDITY_NETWORK_LATENCY_MILLIS:100}
      taker-fee-bps: ${COPY_LIQUIDITY_TAKER_FEE_BPS:4}
      funding-bps-per-eight-hours: ${COPY_LIQUIDITY_FUNDING_BPS_PER_EIGHT_HOURS:1}
  calibration:
    medium-sample-size: ${COPY_CALIBRATION_MEDIUM_SAMPLE_SIZE:10}
    high-sample-size: ${COPY_CALIBRATION_HIGH_SAMPLE_SIZE:30}
    maximum-age: ${COPY_CALIBRATION_MAXIMUM_AGE:P14D}
    notional-band:
      small-max-usd: ${COPY_CALIBRATION_NOTIONAL_SMALL_MAX_USD:100}
      medium-max-usd: ${COPY_CALIBRATION_NOTIONAL_MEDIUM_MAX_USD:1000}
      large-max-usd: ${COPY_CALIBRATION_NOTIONAL_LARGE_MAX_USD:10000}

operation:
  movement-ledger:
    enabled: ${OPERATION_MOVEMENT_LEDGER_ENABLED:true}
    worker-threads: ${OPERATION_MOVEMENT_LEDGER_WORKER_THREADS:8}
    queue-capacity: ${OPERATION_MOVEMENT_LEDGER_QUEUE_CAPACITY:100000}
  job:
    ingest:
      filter-by-wallet-allocation: ${COPY_JOB_INGEST_FILTER_BY_WALLET_ALLOCATION:true}
      fallback-all-users-on-empty-allocation: ${COPY_JOB_INGEST_FALLBACK_ALL_USERS_ON_EMPTY_ALLOCATION:false}
    worker:
      pool-size: ${COPY_JOB_WORKER_POOL_SIZE:32}
      queue: ${COPY_JOB_WORKER_QUEUE:50000}
      max-batch: ${COPY_JOB_WORKER_MAX_BATCH:500}
      poll-ms: ${COPY_JOB_WORKER_POLL_MS:50}
      max-attempts: ${COPY_JOB_WORKER_MAX_ATTEMPTS:12}
    priority-worker:
      pool-size: ${COPY_JOB_PRIORITY_WORKER_POOL_SIZE:16}
      queue: ${COPY_JOB_PRIORITY_WORKER_QUEUE:20000}

engine:
  copy:
    allocation-scoped-runtime: ${ENGINE_COPY_ALLOCATION_SCOPED_RUNTIME:true}
    lock:
      provider: ${ENGINE_COPY_LOCK_PROVIDER:local}
    execution-job-worker:
      enabled: true
    reconcile:
      on-open: ${ENGINE_COPY_RECONCILE_ON_OPEN:true}
      on-close: ${ENGINE_COPY_RECONCILE_ON_CLOSE:true}
      trigger-scoped: ${ENGINE_COPY_RECONCILE_TRIGGER_SCOPED:true}
      max-missing-open-age: ${ENGINE_COPY_RECONCILE_MAX_MISSING_OPEN_AGE:PT60S}
      max-missing-open-price-drift-pct: ${ENGINE_COPY_RECONCILE_MAX_MISSING_OPEN_PRICE_DRIFT_PCT:0.003}
      skip-stale-increase: ${ENGINE_COPY_RECONCILE_SKIP_STALE_INCREASE:true}
      max-increase-source-age: ${ENGINE_COPY_RECONCILE_MAX_INCREASE_SOURCE_AGE:PT60S}
    rebalance:
      skip-small-increase: ${ENGINE_COPY_REBALANCE_SKIP_SMALL_INCREASE:true}
    sizing:
      max-fraction-per-trade: ${ENGINE_COPY_MAX_FRACTION_PER_TRADE:1}
      notional-buffer-pct: ${ENGINE_COPY_NOTIONAL_BUFFER_PCT:0.03}
  metric-wallet:
    distribution-worker:
      enabled: ${METRIC_WALLET_DISTRIBUTION_WORKER_ENABLED:false}

metric-wallet:
  read-mode: ${METRIC_WALLET_READ_MODE:COMPARE}
  history:
    source: ${METRIC_WALLET_HISTORY_SOURCE:joyas}
    limit: ${METRIC_WALLET_HISTORY_LIMIT:300}
    dayz: ${METRIC_WALLET_HISTORY_DAYZ:30}
    min-history-days: ${METRIC_WALLET_HISTORY_MIN_HISTORY_DAYS:1}
    cache:
      max-size: ${METRIC_WALLET_HISTORY_CACHE_MAX_SIZE:1}
      refresh-after: ${METRIC_WALLET_HISTORY_CACHE_REFRESH_AFTER:6m}
      expire-after: ${METRIC_WALLET_HISTORY_CACHE_EXPIRE_AFTER:10m}
    slow-threshold: ${METRIC_WALLET_HISTORY_SLOW_THRESHOLD:250ms}
  joyas:
    limit: ${METRIC_WALLET_JOYAS_LIMIT:3}
    dayz: ${METRIC_WALLET_JOYAS_DAYZ:30}
    simulation: ${METRIC_WALLET_JOYAS_SIMULATION:summary}
  v2:
    summary-limit: ${METRIC_WALLET_V2_SUMMARY_LIMIT:${METRIC_WALLET_HISTORY_LIMIT:300}}
    full-limit: ${METRIC_WALLET_V2_FULL_LIMIT:${METRIC_WALLET_SHADOW_MAX_STRATEGIES:80}}
    summary-refresh-after: ${METRIC_WALLET_V2_SUMMARY_REFRESH_AFTER:PT2M}
    full-refresh-after: ${METRIC_WALLET_V2_FULL_REFRESH_AFTER:PT10M}
    copy-guard-refresh-after: ${METRIC_WALLET_V2_COPY_GUARD_REFRESH_AFTER:PT2M}
    max-staleness: ${METRIC_WALLET_V2_MAX_STALENESS:PT10M}
    fail-open-new-exposure: ${METRIC_WALLET_V2_FAIL_OPEN_NEW_EXPOSURE:false}
    allow-close-on-failure: ${METRIC_WALLET_V2_ALLOW_CLOSE_ON_FAILURE:true}
    shadow-auto-enroll-enabled: ${METRIC_WALLET_V2_SHADOW_AUTO_ENROLL_ENABLED:false}
  copy-guard:
    enabled: ${METRIC_WALLET_COPY_GUARD_ENABLED:true}
    windows: ${METRIC_WALLET_COPY_GUARD_WINDOWS:1w,2w,3w,1mo,2mo,3mo}
    decision-windows: ${METRIC_WALLET_COPY_GUARD_DECISION_WINDOWS:1w,2w,3w,1mo,2mo,3mo}
    available-windows: ${METRIC_WALLET_COPY_GUARD_AVAILABLE_WINDOWS:1d,3d,1w,2w,3w,1mo,2mo,3mo,6mo,9mo,1y,2y,all}
    future-windows: ${METRIC_WALLET_COPY_GUARD_FUTURE_WINDOWS:6mo,9mo,1y,2y}
    snapshot:
      enabled: ${METRIC_WALLET_COPY_GUARD_SNAPSHOT_ENABLED:true}
    stale-snapshot-max-age: ${METRIC_WALLET_COPY_GUARD_STALE_SNAPSHOT_MAX_AGE:10m}
    min-window-pnl-usdt: ${METRIC_WALLET_COPY_GUARD_MIN_WINDOW_PNL_USDT:0}
    min-total-pnl-usdt: ${METRIC_WALLET_COPY_GUARD_MIN_TOTAL_PNL_USDT:0}
    pause-window-pnl-usdt: ${METRIC_WALLET_COPY_GUARD_PAUSE_WINDOW_PNL_USDT:-25}
    pause-total-pnl-usdt: ${METRIC_WALLET_COPY_GUARD_PAUSE_TOTAL_PNL_USDT:-50}
    one-week-capital-multiplier: ${METRIC_WALLET_COPY_GUARD_1W_CAPITAL_MULTIPLIER:1.0}
    one-month-capital-multiplier: ${METRIC_WALLET_COPY_GUARD_1MO_CAPITAL_MULTIPLIER:0.25}
    severe-loss:
      1w:
        enabled: ${METRIC_WALLET_COPY_GUARD_SEVERE_LOSS_1W_ENABLED:true}
        min-closed-operations: ${METRIC_WALLET_COPY_GUARD_SEVERE_LOSS_1W_MIN_CLOSED_OPERATIONS:10}
        fallback-capital-base-usd: ${METRIC_WALLET_COPY_GUARD_SEVERE_LOSS_1W_FALLBACK_CAPITAL_BASE_USD:100}
        warning-loss-pct: ${METRIC_WALLET_COPY_GUARD_SEVERE_LOSS_1W_WARNING_LOSS_PCT:-0.10}
        pause-open-loss-pct: ${METRIC_WALLET_COPY_GUARD_SEVERE_LOSS_1W_PAUSE_OPEN_LOSS_PCT:-0.20}
        shadow-revalidation-loss-pct: ${METRIC_WALLET_COPY_GUARD_SEVERE_LOSS_1W_SHADOW_REVALIDATION_LOSS_PCT:-0.40}
        warning-reason: ${METRIC_WALLET_COPY_GUARD_SEVERE_LOSS_1W_WARNING_REASON:NEGATIVE_1W_WARNING_ONLY}
        strong-warning-reason: ${METRIC_WALLET_COPY_GUARD_SEVERE_LOSS_1W_STRONG_WARNING_REASON:NEGATIVE_1W_STRONG_WARNING}
        pause-open-reason: ${METRIC_WALLET_COPY_GUARD_SEVERE_LOSS_1W_PAUSE_OPEN_REASON:SEVERE_NEGATIVE_1W_PAUSE_OPEN}
        shadow-revalidation-reason: ${METRIC_WALLET_COPY_GUARD_SEVERE_LOSS_1W_SHADOW_REVALIDATION_REASON:BRUTAL_NEGATIVE_1W_SHADOW_REVALIDATION}
    require-window-data: ${METRIC_WALLET_COPY_GUARD_REQUIRE_WINDOW_DATA:false}
    fail-open-on-missing-metric: ${METRIC_WALLET_COPY_GUARD_FAIL_OPEN_ON_MISSING_METRIC:false}
    min-history-days-for-candidate-shadow: ${METRIC_WALLET_COPY_GUARD_MIN_HISTORY_DAYS_FOR_CANDIDATE_SHADOW:30}
    min-operations-for-candidate-shadow: ${METRIC_WALLET_COPY_GUARD_MIN_OPERATIONS_FOR_CANDIDATE_SHADOW:30}
    allow-watchlist-shadow-for-new-wallets: ${METRIC_WALLET_COPY_GUARD_ALLOW_WATCHLIST_SHADOW_FOR_NEW_WALLETS:true}
    cooldown-hours: ${METRIC_WALLET_COPY_GUARD_COOLDOWN_HOURS:48}
  shadow:
    separate-enabled: ${METRIC_WALLET_SHADOW_SEPARATE_ENABLED:true}
    max-strategies: ${METRIC_WALLET_SHADOW_MAX_STRATEGIES:80}
    version: ${METRIC_WALLET_SHADOW_VERSION:1}
    require-positive-windows: ${METRIC_WALLET_SHADOW_REQUIRE_POSITIVE_WINDOWS:2w,1mo}
    slippage-bps: ${METRIC_WALLET_SHADOW_SLIPPAGE_BPS:2}
    require-validation-before-live: ${METRIC_WALLET_SHADOW_REQUIRE_VALIDATION_BEFORE_LIVE:true}
    min-closed-operations-for-live: ${METRIC_WALLET_SHADOW_MIN_CLOSED_OPERATIONS_FOR_LIVE:50}
    min-net-pnl-usdt-for-live: ${METRIC_WALLET_SHADOW_MIN_NET_PNL_USDT_FOR_LIVE:0}
    warmup-minutes: ${METRIC_WALLET_SHADOW_WARMUP_MINUTES:60}
    reentry-capital-multiplier: ${METRIC_WALLET_SHADOW_REENTRY_CAPITAL_MULTIPLIER:0.25}
  allocation:
    sync-enabled: ${METRIC_WALLET_SYNC_DISTRIBUTION_ENABLED:false}
    default-execution-mode: ${METRIC_WALLET_ALLOCATION_DEFAULT_EXECUTION_MODE:SHADOW}
    direct-live-policy: ${METRIC_WALLET_ALLOCATION_DIRECT_LIVE_POLICY:REQUIRE_MICRO_LIVE}
    max-profiles-per-wallet: ${COPY_USER_MAX_PROFILES_PER_WALLET:1}
    live-distribution-validity: ${METRIC_WALLET_LIVE_DISTRIBUTION_VALIDITY:5m}
    runtime-cache-ttl: ${METRIC_WALLET_ALLOCATION_RUNTIME_CACHE_TTL:1500ms}
    runtime-cache-max-size: ${METRIC_WALLET_ALLOCATION_RUNTIME_CACHE_MAX_SIZE:20000}
  distribution:
    refresh-job: ${METRIC_WALLET_DISTRIBUTION_REFRESH_JOB:2m}

copy-profile:
  movement-all-enabled: ${COPY_PROFILE_MOVEMENT_ALL_ENABLED:true}
  long-only-enabled: ${COPY_PROFILE_LONG_ONLY_ENABLED:true}
  short-only-enabled: ${COPY_PROFILE_SHORT_ONLY_ENABLED:true}
  first-open-final-close-enabled: ${COPY_PROFILE_FIRST_OPEN_FINAL_CLOSE_ENABLED:true}
  pure-open-close-enabled: ${COPY_PROFILE_PURE_OPEN_CLOSE_ENABLED:true}
  flip-only-enabled: ${COPY_PROFILE_FLIP_ONLY_ENABLED:true}
  symbol-specialist-enabled: ${COPY_PROFILE_SYMBOL_SPECIALIST_ENABLED:true}
  high-liquidity-only-enabled: ${COPY_PROFILE_HIGH_LIQUIDITY_ONLY_ENABLED:true}
  majors-only-enabled: ${COPY_PROFILE_MAJORS_ONLY_ENABLED:true}
  high-quality-symbols-only-enabled: ${COPY_PROFILE_HIGH_QUALITY_SYMBOLS_ONLY_ENABLED:true}
  low-leverage-only-enabled: ${COPY_PROFILE_LOW_LEVERAGE_ONLY_ENABLED:true}
  top-symbols-only-enabled: ${COPY_PROFILE_TOP_SYMBOLS_ONLY_ENABLED:true}
  swing-only-enabled: ${COPY_PROFILE_SWING_ONLY_ENABLED:true}
  recent-windows-as-live-enabled: ${COPY_PROFILE_RECENT_WINDOWS_AS_LIVE_ENABLED:false}
  majors-symbols: ${COPY_PROFILE_MAJORS_SYMBOLS:BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,DOGEUSDT,LINKUSDT,AVAXUSDT}
  blocked-symbols: ${COPY_PROFILE_BLOCKED_SYMBOLS:FARTCOINUSDT,LITUSDT}
  allowed-symbols: ${COPY_PROFILE_ALLOWED_SYMBOLS:}

copy-shadow:
  enable-scoring-windows: ${COPY_SHADOW_ENABLE_SCORING_WINDOWS:false}

futures:
  capital-maintenance:
    enabled: ${FUTURES_CAPITAL_MAINTENANCE_ENABLED:true}
    initial-delay-ms: ${FUTURES_CAPITAL_MAINTENANCE_INITIAL_DELAY_MS:30000}
    fixed-delay-ms: ${FUTURES_CAPITAL_MAINTENANCE_FIXED_DELAY_MS:6000}
    min-available: ${FUTURES_CAPITAL_MAINTENANCE_MIN_AVAILABLE:50}
    bnb-min-ratio: ${FUTURES_CAPITAL_MAINTENANCE_BNB_MIN_RATIO:0.03}
    conversion-ratio: ${FUTURES_CAPITAL_MAINTENANCE_CONVERSION_RATIO:0.10}
    bnb-price-base-url: ${FUTURES_CAPITAL_MAINTENANCE_BNB_PRICE_BASE_URL:https://fapi.binance.com}
    bnb-price-timeout-ms: ${FUTURES_CAPITAL_MAINTENANCE_BNB_PRICE_TIMEOUT_MS:1000}
    bnb-price-cache-ttl-ms: ${FUTURES_CAPITAL_MAINTENANCE_BNB_CACHE_TTL_MS:60000}

hyperliquid:
  direct-ingest:
    enabled: ${HYPERLIQUID_DIRECT_INGEST_ENABLED:true}
    queue-capacity: ${HYPERLIQUID_DIRECT_INGEST_QUEUE_CAPACITY:100000}
    worker-threads: ${HYPERLIQUID_DIRECT_INGEST_WORKER_THREADS:8}
    reject-when-disabled: ${HYPERLIQUID_DIRECT_INGEST_REJECT_WHEN_DISABLED:true}
    dedupe-enabled: ${HYPERLIQUID_DIRECT_INGEST_DEDUPE_ENABLED:true}
    dedupe-ttl-seconds: ${HYPERLIQUID_DIRECT_INGEST_DEDUPE_TTL_SECONDS:30}
    distributed-dedupe-enabled: ${HYPERLIQUID_DIRECT_INGEST_DISTRIBUTED_DEDUPE_ENABLED:false}
    dedupe-lease-ttl-ms: ${HYPERLIQUID_DIRECT_INGEST_DEDUPE_LEASE_TTL_MS:60000}
    fail-open-on-dedupe-error: ${HYPERLIQUID_DIRECT_INGEST_FAIL_OPEN_ON_DEDUPE_ERROR:false}
    log-interval-ms: ${HYPERLIQUID_DIRECT_INGEST_LOG_INTERVAL_MS:10000}
    fallback-db-on-direct-failure: ${HYPERLIQUID_DIRECT_INGEST_FALLBACK_DB_ON_DIRECT_FAILURE:true}
    origin-store:
      enabled: ${HYPERLIQUID_ORIGIN_STORE_ENABLED:true}
      worker-threads: ${HYPERLIQUID_ORIGIN_STORE_WORKER_THREADS:8}
      queue-capacity: ${HYPERLIQUID_ORIGIN_STORE_QUEUE_CAPACITY:100000}
      hydrate-open-positions: ${HYPERLIQUID_ORIGIN_STORE_HYDRATE_OPEN_POSITIONS:true}
      fail-copy-on-bind-error: ${HYPERLIQUID_ORIGIN_STORE_FAIL_COPY_ON_BIND_ERROR:false}
      skip-late-adjustments: ${HYPERLIQUID_ORIGIN_STORE_SKIP_LATE_ADJUSTMENTS:true}
      binance-price-enabled: ${HYPERLIQUID_ORIGIN_STORE_BINANCE_PRICE_ENABLED:true}
      binance-price-engine-enabled: ${HYPERLIQUID_ORIGIN_STORE_BINANCE_PRICE_ENGINE_ENABLED:true}
      binance-price-engine-allow-stale: ${HYPERLIQUID_ORIGIN_STORE_BINANCE_PRICE_ENGINE_ALLOW_STALE:true}
      binance-price-base-url: ${HYPERLIQUID_ORIGIN_STORE_BINANCE_PRICE_BASE_URL:https://fapi.binance.com}
      binance-price-timeout-ms: ${HYPERLIQUID_ORIGIN_STORE_BINANCE_PRICE_TIMEOUT_MS:300}
      binance-price-cache-ttl-ms: ${HYPERLIQUID_ORIGIN_STORE_BINANCE_PRICE_CACHE_TTL_MS:5000}
      binance-price-cache-size: ${HYPERLIQUID_ORIGIN_STORE_BINANCE_PRICE_CACHE_SIZE:8192}
      binance-price-miss-cache-ttl-ms: ${HYPERLIQUID_ORIGIN_STORE_BINANCE_PRICE_MISS_CACHE_TTL_MS:60000}
      binance-price-miss-cache-size: ${HYPERLIQUID_ORIGIN_STORE_BINANCE_PRICE_MISS_CACHE_SIZE:4096}

